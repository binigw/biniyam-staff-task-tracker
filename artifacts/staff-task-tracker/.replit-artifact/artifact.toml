kind = "web"
previewPath = "/"
title = "Staff Task Tracker"
version = "1.0.0"
id = "artifacts/staff-task-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24916

[services.development]
run = "pnpm --filter @workspace/staff-task-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/staff-task-tracker", "run", "build" ]
publicDir = "artifacts/staff-task-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24916"
BASE_PATH = "/"
